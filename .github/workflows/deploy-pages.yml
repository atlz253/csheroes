name: Deploy web game to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Publish Blazor WebAssembly
        run: dotnet publish CSHeroes.Web/CSHeroes.Web.csproj --configuration Release --output publish

      - name: Prepare GitHub Pages files
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_PATH}/\" />|" publish/wwwroot/index.html
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
